<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Timelapse{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f4f0; color: #1a1a1a; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
    nav { background: #fff; padding: 0 28px; display: flex; align-items: center; gap: 28px; height: 52px; border-bottom: 1px solid #e5e2dc; }
    nav .brand { color: #1a1a1a; font-weight: 600; font-size: 14px; text-decoration: none; margin-right: 8px; display: flex; align-items: center; gap: 8px; }
    nav a { color: #999; text-decoration: none; font-size: 13px; }
    nav a.active, nav a:hover { color: #1a1a1a; font-weight: 500; border-bottom: none; }
    main { padding: 28px; max-width: 1100px; margin: 0 auto; }
    .flash { padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; }
    .flash.success { background: #f0faf0; color: #2a7a2a; border: 1px solid #c0e0c0; }
    .flash.error { background: #fdf0f0; color: #cc3333; border: 1px solid #f0c0c0; }
    .flash.info { background: #f5f4f0; color: #888; border: 1px solid #e5e2dc; }
    .card { background: #fff; border: 1px solid #e5e2dc; border-radius: 8px; padding: 16px; }
    .card-label { color: #aaa; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 5px; font-size: 0.875rem; cursor: pointer; border: none; text-decoration: none; font-weight: 500; }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-primary:hover { background: #333; }
    .btn-secondary { background: #f0ede8; color: #555; border: 1px solid #e0ddd8; }
    .btn-secondary:hover { background: #e8e5e0; color: #1a1a1a; }
    .empty-state { color: #bbb; font-size: 0.9rem; padding: 32px 0; text-align: center; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="brand">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Timelapse
    </a>
    <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="/snapshots" class="{% if active == 'snapshots' %}active{% endif %}">Snapshots</a>
    <a href="/videos" class="{% if active == 'videos' %}active{% endif %}">Videos</a>
    <a href="/designer" class="{% if active == 'designer' %}active{% endif %}">Designer</a>
    <a href="/settings" class="{% if active == 'settings' %}active{% endif %}">Settings</a>
  </nav>
  <main>
    {% if flash_message %}
      <div class="flash {{ flash_type }}">{{ flash_message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var watch = params.get('watch');
  var type  = params.get('type');
  var since = params.get('since') || '0';
  if (!watch || !type) return;

  // Strip watch params from URL so refresh doesn't re-poll
  params.delete('watch');
  params.delete('type');
  params.delete('since');
  var clean = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
  history.replaceState(null, '', clean);

  var POLL_MS   = 2000;
  var TIMEOUT_S = 300;
  var start     = Date.now();
  var timer     = null;

  function showBanner(cls, html) {
    var div = document.createElement('div');
    div.className = 'flash ' + cls;
    div.innerHTML = html;
    var main = document.querySelector('main');
    main.parentNode.insertBefore(div, main);
  }

  function successBanner(file) {
    if (type === 'snapshot') {
      showBanner('success',
        'Snapshot captured — <a href="/snapshots?date=' + encodeURIComponent(watch) + '">View snapshots →</a>'
      );
    } else {
      showBanner('success',
        'Timelapse is ready — <a href="/videos?video=' + encodeURIComponent(file) + '">View it →</a>'
      );
    }
  }

  function timeoutBanner() {
    if (type === 'snapshot') {
      showBanner('info',
        'Capture is taking longer than expected — <a href="/snapshots">Go to Snapshots →</a>'
      );
    } else {
      showBanner('info',
        'Build is taking longer than expected — <a href="/videos">Go to Videos →</a>'
      );
    }
  }

  function poll() {
    if ((Date.now() - start) / 1000 >= TIMEOUT_S) {
      timeoutBanner();
      return;
    }
    var url = '/api/status?watch=' + encodeURIComponent(watch) +
              '&type=' + encodeURIComponent(type) +
              '&since=' + encodeURIComponent(since);
    fetch(url)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.ready) {
          successBanner(data.file || watch);
        } else {
          timer = setTimeout(poll, POLL_MS);
        }
      })
      .catch(function () {
        timer = setTimeout(poll, POLL_MS);
      });
  }

  window.addEventListener('pagehide', function () { clearTimeout(timer); });

  poll();
})();
</script>
</body>
</html>
